<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
</style>
</head>
<body>
<script>
(function(){
  var p = new URLSearchParams(window.location.search);
  var v = p.get('v');
  if(!v) return;

  var autoplay = p.get('autoplay') !== '0' ? 1 : 0;
  var mute     = p.get('mute')     !== '0' ? 1 : 0;
  var loop     = p.get('loop')     === '1' ? 1 : 0;
  var controls = p.get('controls') === '1' ? 1 : 0;

  var src = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(v)
    + '?autoplay=' + autoplay
    + '&mute=' + mute
    + '&loop=' + loop
    + '&controls=' + controls
    + '&rel=0&modestbranding=1&playsinline=1';

  if(loop) src += '&playlist=' + encodeURIComponent(v);

  var f = document.createElement('iframe');
  f.src = src;
  f.allow = 'autoplay; encrypted-media; fullscreen';
  f.allowFullscreen = true;
  document.body.appendChild(f);
})();
</script>
</body>
</html>
