<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#player{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="player"></div>
<script>
var p = new URLSearchParams(window.location.search);
var videoId = p.get('v');
var doLoop = p.get('loop') === '1';
var showControls = p.get('controls') === '1' ? 1 : 0;
var volume = parseInt(p.get('vol')) || 100;
var unmuted = false;

if (videoId) {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

var player;
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: videoId,
    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: showControls,
      rel: 0,
      modestbranding: 1,
      playsinline: 1,
      loop: doLoop ? 1 : 0,
      playlist: doLoop ? videoId : undefined
    },
    events: {
      onReady: function(e) {
        e.target.playVideo();
        setTimeout(function() {
          e.target.unMute();
          e.target.setVolume(volume);
          e.target.playVideo();
          unmuted = true;
        }, 1500);
      },
      onStateChange: function(e) {
        if (unmuted && e.data === YT.PlayerState.PAUSED) {
          e.target.playVideo();
        }
      }
    }
  });
}
</script>
</body>
</html>
