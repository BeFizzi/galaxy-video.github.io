<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  YOUTUBE PLAYER fuer fizzi_monitor (GitHub Pages Version)
  Auf https://befizzi.github.io/galaxy-video.github.io/index.html
  einfuegen und committen.
  ════════════════════════════════════════════════════════════════
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#player{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="player"></div>
<script>
var p       = new URLSearchParams(window.location.search);
var videoId = p.get('v');
var doLoop  = p.get('loop') === '1';
var startAt = parseFloat(p.get('t')) || 0;
var volume  = parseInt(p.get('vol'));
if (isNaN(volume)) volume = 100;

var player      = null;
var playerReady = false;
var adActive    = false;

// ════════════════════════════════════════════════════════
// VOLUME
// ════════════════════════════════════════════════════════
function applyVolume() {
  if (!player || !playerReady) return;
  try { player.setVolume(volume); if (volume <= 0) player.mute(); else player.unMute(); } catch(e) {}
}

// ════════════════════════════════════════════════════════
// SKIP — Script-Injection in den YouTube-iframe
//
// Normales dispatchEvent hat isTrusted=false → YouTube ignoriert es.
// Stattdessen: Script-Tag in den iframe-Kontext injizieren.
// Der Script laeuft im selben Origin-Kontext des YouTube-iframes
// und ruft btn.click() nativ auf — das klappt in FiveM CEF.
// ════════════════════════════════════════════════════════

// Dieser Code wird als String in den YouTube-iframe injiziert
var INJECT_SRC = [
  '(function(){',
  '  var sel=[',
  '    "button.ytp-ad-skip-button-modern",',
  '    ".ytp-ad-skip-button-modern",',
  '    "button.ytp-ad-skip-button",',
  '    ".ytp-ad-skip-button",',
  '    ".ytp-skip-ad-button",',
  '    ".ytp-ad-overlay-close-button",',
  '    ".ytp-ad-skip-button-container button",',
  '  ];',
  '  for(var i=0;i<sel.length;i++){',
  '    var els=document.querySelectorAll(sel[i]);',
  '    for(var j=0;j<els.length;j++){',
  '      try{ els[j].click(); }catch(e){}',
  '    }',
  '  }',
  '  // Auch in verschachtelten iframes',
  '  var frames=document.querySelectorAll("iframe");',
  '  for(var f=0;f<frames.length;f++){',
  '    try{',
  '      var d=frames[f].contentDocument||frames[f].contentWindow.document;',
  '      for(var i=0;i<sel.length;i++){',
  '        var b=d.querySelector(sel[i]);',
  '        if(b) b.click();',
  '      }',
  '    }catch(e){}',
  '  }',
  '})();',
].join('\n');

function injectSkipScript(doc) {
  if (!doc) return;
  try {
    var s = doc.createElement('script');
    s.textContent = INJECT_SRC;
    (doc.head || doc.body || doc.documentElement).appendChild(s);
    try { s.parentNode.removeChild(s); } catch(e) {}
  } catch(e) {}
}

function clickSkipButtons() {
  // IFrame-API skipAd versuchen
  try { if (player && typeof player.skipAd === 'function') player.skipAd(); } catch(e) {}

  // Alle iframes durchsuchen
  var iframes = document.querySelectorAll('iframe');
  for (var i = 0; i < iframes.length; i++) {
    var doc = null;
    try { doc = iframes[i].contentDocument; }               catch(e) {}
    if (!doc) try { doc = iframes[i].contentWindow.document; } catch(e) {}

    if (doc) {
      // 1) Direkter querySelector + click()
      var sel = [
        'button.ytp-ad-skip-button-modern',
        '.ytp-ad-skip-button-modern',
        'button.ytp-ad-skip-button',
        '.ytp-ad-skip-button',
        '.ytp-skip-ad-button',
        '.ytp-ad-overlay-close-button',
      ];
      for (var s = 0; s < sel.length; s++) {
        var els;
        try { els = doc.querySelectorAll(sel[s]); } catch(ex) { continue; }
        for (var j = 0; j < els.length; j++) {
          try { els[j].click(); } catch(ex) {}
        }
      }
      // 2) Script-Injection — laeuft im iframe-Origin-Kontext
      injectSkipScript(doc);
    }

    // postMessage an den iframe (YouTube command-API)
    try {
      iframes[i].contentWindow.postMessage(
        JSON.stringify({ event: 'command', func: 'skipAd', args: [] }), '*'
      );
    } catch(e) {}
  }
}

// ════════════════════════════════════════════════════════
// AD-ERKENNUNG
// ════════════════════════════════════════════════════════
function isAdPlaying() {
  if (!player || !playerReady) return false;
  try {
    var d = player.getVideoData();
    if (d && (!d.video_id || d.video_id === ''))      return true;
    if (d && videoId && d.video_id !== videoId)        return true;
  } catch(e) {}
  try {
    var opts = player.getOptions('ad');
    if (opts && opts.length > 0)                       return true;
  } catch(e) {}
  return false;
}

function onAdDetected() {
  if (!adActive) {
    adActive = true;
    try { player.setVolume(0); player.mute(); } catch(e) {} // stumm als Fallback
  }
  clickSkipButtons();
}

function onAdEnded() {
  if (!adActive) return;
  adActive = false;
  setTimeout(applyVolume, 300);
}

// ════════════════════════════════════════════════════════
// INTERVALLE
// ════════════════════════════════════════════════════════
setInterval(function() {
  if (!player || !playerReady) return;
  if (isAdPlaying()) onAdDetected();
  else               onAdEnded();
}, 200);

setInterval(applyVolume, 2000);

// ════════════════════════════════════════════════════════
// POSTMESSAGE
// ════════════════════════════════════════════════════════
window.addEventListener('message', function(event) {
  var data = event.data;
  if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e) { return; } }
  if (!data) return;

  if (data.type === 'setVolume') {
    var v = parseFloat(data.volume);
    if (!isNaN(v)) { volume = Math.round(v * 100); if (!adActive) applyVolume(); }
    return;
  }
  if (data.type === 'skipAd') { clickSkipButtons(); return; }

  if (data.event === 'infoDelivery' && data.info && data.info.videoData) {
    var vd = data.info.videoData;
    var isAd = (!vd.video_id || vd.video_id === '') || (videoId && vd.video_id !== videoId);
    if (isAd) onAdDetected();
    else      onAdEnded();
  }
});

// ════════════════════════════════════════════════════════
// YOUTUBE API
// ════════════════════════════════════════════════════════
if (videoId) {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    host: 'https://www.youtube-nocookie.com',
    videoId: videoId,
    playerVars: {
      autoplay: 1, mute: 1, controls: 0, rel: 0,
      modestbranding: 1, playsinline: 1, enablejsapi: 1,
      start: Math.floor(startAt),
      loop: doLoop ? 1 : 0, playlist: doLoop ? videoId : undefined,
      iv_load_policy: 3, fs: 0, origin: window.location.origin,
    },
    events: {
      onReady: function(e) {
        playerReady = true;
        try { e.target.playVideo(); } catch(ex) {}
        setTimeout(function() {
          try { e.target.unMute(); e.target.setVolume(volume); e.target.playVideo(); } catch(ex) {}
        }, 800);
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          setTimeout(function() { if (!isAdPlaying()) onAdEnded(); else onAdDetected(); }, 100);
        }
        if (e.data === YT.PlayerState.PAUSED && !adActive && volume > 0) {
          try { e.target.playVideo(); } catch(ex) {}
        }
      },
      onApiChange: function(e) {
        try { var o = e.target.getOptions('ad'); if (o && o.length) onAdDetected(); } catch(ex) {}
      }
    }
  });
}
</script>
</body>
</html>
