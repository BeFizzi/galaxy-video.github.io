<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  YOUTUBE PLAYER fuer fizzi_monitor (GitHub Pages Version)
  Auf https://befizzi.github.io/galaxy-video.github.io/index.html
  einfuegen und committen.
  ════════════════════════════════════════════════════════════════
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#player{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="player"></div>
<script>
var p = new URLSearchParams(window.location.search);
var videoId   = p.get('v');
var doLoop    = p.get('loop') === '1';
var startAt   = parseFloat(p.get('t')) || 0;
var volume    = parseInt(p.get('vol'));
if (isNaN(volume)) volume = 100;

var player        = null;
var playerReady   = false;
var adActive      = false;
var reloadCount   = 0;
var MAX_RELOADS   = 20;
var lastReload    = 0;
var RELOAD_COOLDOWN = 2000;

// ════════════════════════════════════════════════════════
// VOLUME
// ════════════════════════════════════════════════════════
function applyVolume() {
  if (!player || !playerReady) return;
  try {
    player.setVolume(volume);
    if (volume <= 0) player.mute();
    else player.unMute();
  } catch(e) {}
}

// ════════════════════════════════════════════════════════
// AD-ERKENNUNG — mehrere Methoden kombiniert
// ════════════════════════════════════════════════════════

// Methode 1: getVideoData().video_id leer oder abweichend
function isAdByVideoData() {
  if (!player || !playerReady) return false;
  try {
    var d = player.getVideoData();
    if (!d) return false;
    if (!d.video_id || d.video_id === '') return true;
    if (videoId && d.video_id !== videoId) return true;
  } catch(e) {}
  return false;
}

// Methode 2: getOptions('ad') — nur befuellt waehrend Werbung
function isAdByOptions() {
  if (!player || !playerReady) return false;
  try {
    var opts = player.getOptions('ad');
    if (opts && opts.length > 0) return true;
  } catch(e) {}
  return false;
}

function isAdPlaying() {
  return isAdByVideoData() || isAdByOptions();
}

// ════════════════════════════════════════════════════════
// SKIP
// ════════════════════════════════════════════════════════
function skipCurrentAd() {
  if (!player || !playerReady) return;

  // 1) Offizielle undokumentierte API
  try { if (typeof player.skipAd === 'function') player.skipAd(); } catch(e) {}

  // 2) loadVideoById — Video neu starten, Werbung umgehen
  var now = Date.now();
  if (now - lastReload < RELOAD_COOLDOWN) return;
  if (reloadCount >= MAX_RELOADS) {
    try { player.mute(); } catch(e) {}
    return;
  }
  lastReload = now;
  reloadCount++;
  try {
    player.loadVideoById({ videoId: videoId, startSeconds: 0 });
    setTimeout(function() {
      applyVolume();
      try { player.playVideo(); } catch(e) {}
    }, 1000);
  } catch(e) {}
}

// ════════════════════════════════════════════════════════
// INTERVALL-CHECKS
// ════════════════════════════════════════════════════════
setInterval(function() {
  if (!player || !playerReady) return;
  if (isAdPlaying()) {
    if (!adActive) {
      adActive = true;
      try { player.mute(); } catch(e) {}
    }
    skipCurrentAd();
  } else {
    if (adActive) {
      adActive = false;
      reloadCount = 0;
      setTimeout(applyVolume, 400);
    }
  }
}, 300);

setInterval(applyVolume, 2000);

// ════════════════════════════════════════════════════════
// POSTMESSAGE — YouTube-Events + eigene Kommandos
// ════════════════════════════════════════════════════════
window.addEventListener('message', function(event) {
  var data = event.data;
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return; }
  }
  if (!data) return;

  // Eigene Kommandos vom Wrapper / FiveM
  if (data.type === 'setVolume') {
    var v = parseFloat(data.volume);
    if (!isNaN(v)) { volume = Math.round(v * 100); applyVolume(); }
    return;
  }
  if (data.type === 'skipAd') {
    skipCurrentAd();
    return;
  }

  // YouTube IFrame API sendet infoDelivery-Events mit Videodaten
  // → Ad-Erkennung ueber postMessage (zuverlaessiger als Polling)
  if (data.event === 'infoDelivery' && data.info) {
    var info = data.info;
    var vd   = info && info.videoData;
    if (vd) {
      var isAd = (!vd.video_id || vd.video_id === '')
              || (videoId && vd.video_id !== videoId);
      if (isAd && !adActive) {
        adActive = true;
        try { if (player && playerReady) player.mute(); } catch(e) {}
        skipCurrentAd();
      }
    }
  }
});

// ════════════════════════════════════════════════════════
// YOUTUBE API
// ════════════════════════════════════════════════════════
if (videoId) {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    // youtube-nocookie.com = Privacy-Enhanced-Mode
    // → deutlich weniger oder gar keine Werbung im Embed
    host: 'https://www.youtube-nocookie.com',
    videoId: videoId,
    playerVars: {
      autoplay:       1,
      mute:           1,
      controls:       0,
      rel:            0,
      modestbranding: 1,
      playsinline:    1,
      enablejsapi:    1,
      start:          Math.floor(startAt),
      loop:           doLoop ? 1 : 0,
      playlist:       doLoop ? videoId : undefined,
      iv_load_policy: 3,
      fs:             0,
      // origin muss zur GitHub-Pages-Domain passen
      origin:         window.location.origin,
    },
    events: {
      onReady: function(e) {
        playerReady = true;
        try { e.target.playVideo(); } catch(ex) {}
        setTimeout(function() {
          try {
            e.target.unMute();
            e.target.setVolume(volume);
            e.target.playVideo();
          } catch(ex) {}
        }, 800);
      },
      onStateChange: function(e) {
        // Wenn das Video wirklich spielt und kein Ad → Lautstaerke anwenden
        if (e.data === YT.PlayerState.PLAYING) {
          setTimeout(function() {
            if (!isAdPlaying()) {
              adActive    = false;
              reloadCount = 0;
              applyVolume();
            }
          }, 200);
        }
        if (e.data === YT.PlayerState.PAUSED && volume > 0 && !isAdPlaying()) {
          try { e.target.playVideo(); } catch(ex) {}
        }
      },
      // onApiChange feuert wenn Ad-Modul geladen wird → zuverlaessigste Methode
      onApiChange: function(e) {
        try {
          var opts = e.target.getOptions('ad');
          if (opts && opts.length > 0) {
            adActive = true;
            try { e.target.mute(); } catch(ex) {}
            setTimeout(skipCurrentAd, 50);
          }
        } catch(ex) {}
      }
    }
  });
}
</script>
</body>
</html>
