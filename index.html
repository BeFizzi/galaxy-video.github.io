<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  YOUTUBE PLAYER fuer fizzi_monitor (GitHub Pages Version)
  Auf https://befizzi.github.io/galaxy-video.github.io/index.html
  einfuegen und committen.
  ════════════════════════════════════════════════════════════════
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YT</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#player{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="player"></div>
<script>
var p       = new URLSearchParams(window.location.search);
var videoId = p.get('v');
var doLoop  = p.get('loop') === '1';
var startAt = parseFloat(p.get('t')) || 0;
var volume  = parseInt(p.get('vol'));
if (isNaN(volume)) volume = 100;

var player      = null;
var playerReady = false;
var adActive    = false;

// ════════════════════════════════════════════════════════
// VOLUME
// ════════════════════════════════════════════════════════
function applyVolume() {
  if (!player || !playerReady) return;
  try {
    player.setVolume(volume);
    if (volume <= 0) player.mute();
    else             player.unMute();
  } catch(e) {}
}

// ════════════════════════════════════════════════════════
// SKIP-BUTTON KLICKEN
// In FiveM CEF kann contentDocument erreichbar sein.
// Gleichzeitig: postMessage direkt an den YouTube-iframe.
// ════════════════════════════════════════════════════════
var SKIP_SEL = [
  'button.ytp-ad-skip-button-modern',
  '.ytp-ad-skip-button-modern',
  'button.ytp-ad-skip-button',
  '.ytp-ad-skip-button',
  '.ytp-skip-ad-button',
  '.ytp-ad-skip-button-slot button',
  '.ytp-ad-skip-button-container button',
  '.ytp-ad-overlay-close-button',
];

function clickEl(el, win) {
  if (!el) return;
  try { el.click(); } catch(e) {}
  try {
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top  + rect.height / 2;
    var w  = win || window;
    ['pointerdown','pointerup','mousedown','mouseup','click'].forEach(function(t) {
      try {
        el.dispatchEvent(new MouseEvent(t, {
          bubbles: true, cancelable: true, view: w, clientX: cx, clientY: cy
        }));
      } catch(ex) {}
    });
  } catch(e) {}
  try {
    var btn = el.closest && el.closest('button');
    if (btn && btn !== el) btn.click();
  } catch(e) {}
}

function tryClickInDoc(doc, win) {
  if (!doc) return;
  for (var s = 0; s < SKIP_SEL.length; s++) {
    var els;
    try { els = doc.querySelectorAll(SKIP_SEL[s]); } catch(e) { continue; }
    for (var i = 0; i < els.length; i++) { clickEl(els[i], win); }
  }
  // Rekursiv in verschachtelten iframes
  var frames;
  try { frames = doc.querySelectorAll('iframe'); } catch(e) { return; }
  for (var f = 0; f < frames.length; f++) {
    var d = null;
    var w = null;
    try { d = frames[f].contentDocument; w = frames[f].contentWindow; } catch(e) {}
    if (!d) try { d = frames[f].contentWindow && frames[f].contentWindow.document; } catch(e) {}
    if (d) tryClickInDoc(d, w);
  }
}

function clickSkipButtons() {
  // 1) Im Hauptdokument suchen
  tryClickInDoc(document, window);

  // 2) In allen iframes (YouTube-Player)
  var iframes = document.querySelectorAll('iframe');
  for (var i = 0; i < iframes.length; i++) {
    var iframe = iframes[i];
    var doc = null, win = null;

    // DOM-Zugriff (klappt in FiveM CEF wenn cross-origin erlaubt)
    try { win = iframe.contentWindow; doc = iframe.contentDocument; } catch(e) {}
    if (!doc && win) try { doc = win.document; } catch(e) {}
    if (doc) tryClickInDoc(doc, win);

    // postMessage direkt an YouTube-iframe — YouTube hoert auf "command"-Messages
    try {
      iframe.contentWindow.postMessage(JSON.stringify({
        event: 'command',
        func:  'skipAd',
        args:  []
      }), '*');
    } catch(e) {}
  }

  // 3) IFrame-API skipAd (undokumentiert aber harmlos)
  try { if (player && typeof player.skipAd === 'function') player.skipAd(); } catch(e) {}
}

// ════════════════════════════════════════════════════════
// AD-ERKENNUNG
// ════════════════════════════════════════════════════════
function isAdPlaying() {
  if (!player || !playerReady) return false;
  try {
    var d = player.getVideoData();
    if (d && (!d.video_id || d.video_id === ''))       return true;
    if (d && videoId && d.video_id !== videoId)         return true;
  } catch(e) {}
  try {
    var opts = player.getOptions('ad');
    if (opts && opts.length > 0)                        return true;
  } catch(e) {}
  return false;
}

function onAdDetected() {
  if (!adActive) {
    adActive = true;
    // Stumm — falls Skip nicht klappt hoert man die Werbung nicht
    try { player.setVolume(0); player.mute(); } catch(e) {}
  }
  clickSkipButtons();
}

function onAdEnded() {
  if (!adActive) return;
  adActive = false;
  setTimeout(applyVolume, 300);
}

// ════════════════════════════════════════════════════════
// INTERVALLE
// ════════════════════════════════════════════════════════
// Skip-Versuch alle 200ms (schnell genug um den Moment zu erwischen)
setInterval(function() {
  if (!player || !playerReady) return;
  if (isAdPlaying()) onAdDetected();
  else               onAdEnded();
}, 200);

setInterval(applyVolume, 2000);

// ════════════════════════════════════════════════════════
// POSTMESSAGE — YouTube infoDelivery + eigene Kommandos
// ════════════════════════════════════════════════════════
window.addEventListener('message', function(event) {
  var data = event.data;
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return; }
  }
  if (!data) return;

  if (data.type === 'setVolume') {
    var v = parseFloat(data.volume);
    if (!isNaN(v)) { volume = Math.round(v * 100); if (!adActive) applyVolume(); }
    return;
  }
  if (data.type === 'skipAd') {
    clickSkipButtons();
    return;
  }

  // YouTube infoDelivery
  if (data.event === 'infoDelivery' && data.info && data.info.videoData) {
    var vd   = data.info.videoData;
    var isAd = (!vd.video_id || vd.video_id === '')
            || (videoId && vd.video_id !== videoId);
    if (isAd) onAdDetected();
    else      onAdEnded();
  }
});

// ════════════════════════════════════════════════════════
// YOUTUBE API
// ════════════════════════════════════════════════════════
if (videoId) {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    host: 'https://www.youtube-nocookie.com',
    videoId: videoId,
    playerVars: {
      autoplay:       1,
      mute:           1,
      controls:       0,
      rel:            0,
      modestbranding: 1,
      playsinline:    1,
      enablejsapi:    1,
      start:          Math.floor(startAt),
      loop:           doLoop ? 1 : 0,
      playlist:       doLoop ? videoId : undefined,
      iv_load_policy: 3,
      fs:             0,
      origin:         window.location.origin,
    },
    events: {
      onReady: function(e) {
        playerReady = true;
        try { e.target.playVideo(); } catch(ex) {}
        setTimeout(function() {
          try { e.target.unMute(); e.target.setVolume(volume); e.target.playVideo(); } catch(ex) {}
        }, 800);
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          setTimeout(function() {
            if (!isAdPlaying()) onAdEnded();
            else                onAdDetected();
          }, 100);
        }
        if (e.data === YT.PlayerState.PAUSED && !adActive && volume > 0) {
          try { e.target.playVideo(); } catch(ex) {}
        }
      },
      onApiChange: function(e) {
        try {
          var opts = e.target.getOptions('ad');
          if (opts && opts.length > 0) onAdDetected();
        } catch(ex) {}
      }
    }
  });
}
</script>
</body>
</html>
